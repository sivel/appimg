name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -tags no_gpl \
            -ldflags "-s -w -X 'github.com/sivel/appimg/cmd.version=${{ github.ref_name }}'" \
            -o appimg-linux-${{ matrix.goarch }} \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: appimg-linux-${{ matrix.goarch }}
          path: appimg-linux-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            appimg-linux-amd64 \
            appimg-linux-arm64
